name: Deploy web to VPS

# Tự deploy khi push vào main (PR merge cũng tính là push main).
# workflow_dispatch: cho phép bấm chạy tay để test.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (git pull + build + pm2 reload trên VPS)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/kidz-web/deploy.sh
